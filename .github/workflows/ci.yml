name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # reads version from packageManager

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # build → typecheck → unit tests → content verification (verify-content
      # runs every challenge's solution against its own tests — the moat gate)
      - run: pnpm turbo build typecheck test lint
